<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang tải...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Nền đen */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: opacity 0.5s ease; /* Hiệu ứng mờ dần khi chuyển trang */
        }

        /* Vòng quay logo Roblox */
        .roblox-spinner {
            width: 80px;
            height: 80px;
            border: 12px solid white;
            border-radius: 18px;
            box-sizing: border-box;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        /* Chữ đang tải */
        .loading-text {
            position: absolute;
            bottom: 20%;
            color: white;
            font-family: sans-serif;
            letter-spacing: 2px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="roblox-spinner"></div>
    <div class="loading-text">ĐANG VÀO SHOP...</div>

    <script>
        // Đợi 3 giây (3000ms) rồi chuyển trang
        setTimeout(function() {
            document.body.style.opacity = '0'; // Làm mờ màn hình
            
            setTimeout(function() {
                // Chuyển sang trang shop chính
                window.location.href = 'index.html'; 
            }, 500); // Đợi thêm 0.5s để hiệu ứng mờ chạy xong
            
        }, 3000); 
    </script>
</body>
</html>
