<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - HOANGKUN STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="login-box col-md-5 col-12">
            <h3 class="text-center mb-4 fw-bold">ĐĂNG NHẬP</h3>
            
            <form>
                <div class="mb-3">
                    <label class="form-label">Tài khoản / Email:</label>
                    <input type="text" class="form-control" placeholder="Nhập tên đăng nhập">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu:</label>
                    <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">ĐĂNG NHẬP</button>
            </form>

            <div class="text-center text-secondary mb-3">- HOẶC -</div>
            
            <div class="social-login">
                <button class="btn btn-danger"><i class="fa-brands fa-google"></i> Đăng nhập bằng Google</button>
                <button class="btn btn-primary"><i class="fa-brands fa-facebook"></i> Đăng nhập bằng Facebook</button>
            </div>
            
            <div class="text-center mt-3">
                <a href="#" class="text-decoration-none">Chưa có tài khoản? Đăng ký ngay</a>
            </div>
        </div>
    </div>
</body>
</html>
