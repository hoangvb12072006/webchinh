<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - HOANGKUN STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-gamepad"></i> HOANGKUN<span>STORE</span></a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm">Trở về</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 text-center">
        <h2 class="text-uppercase fw-bold text-warning mb-4">Vòng Quay Nhân Phẩm</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div style="position: relative; height: 350px;">
                    <div class="wheel-pointer"></div>
                    <div id="luckyWheel" class="wheel-container">
                        <img src="https://png.pngtree.com/png-vector/20240726/ourmid/pngtree-lucky-spin-wheel-game-png-image_13241038.png" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </div>
                <button onclick="spinWheel()" class="btn btn-danger btn-lg mt-4 px-5 fw-bold">QUAY NGAY (10k/lượt)</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
